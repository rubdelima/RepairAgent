grid_search:
  # List of Ollama models to test.
  models:
    - "ollama:gpt-oss:20b"
    # - "ollama:gemma4:12b"

  overwrite: false

  # Arguments passed to `repairagent.py run` (model is injected automatically).
  run:
    # Selection mode:
    # - true: use `bugs_file` if provided; otherwise generate all available Defects4J bugs.
    # - false: ignore `bugs_file` and use only `bugs_ids`.
    all_bugs: true

    # Optional: one bug per line, "Project Index". Used only when all_bugs is true.
    # bugs_file: "bugs_10_each_project.txt"

    # Explicit bug list used only when all_bugs is false.
    # Format: "Project Index" (e.g. "Chart 1").
    bugs_ids:
      - "Chart 1"
      - "Chart 2"

    # Max cycles for each run (0 = unlimited).
    max_cycles: 15

    # Extra args passed verbatim to `repairagent.py run`.
    # Example: ["--docker", "--skip-news"]
    extra_args: []

  # Ollama-specific controls (applied by grid_search to each run).
  ollama:
    # Ollama defaults many models to a 4096-token context. Chart 2's prompt can
    # reach that size, leaving no room for JSON content after reasoning.
    num_ctx: 16384
    # Enable repetition detection (off by default).
    repeat_detect: false
    # Hard timeout (seconds) for the model stream to finish.
    stream_timeout_s: 180

  # Environment variables to set for each run (optional extras).
  env: {}

  # Where to store experiment outputs and logs (per model).
  output_dir: "grid_results_final"
